name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - "scripts/generate-index-html.sh"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Generate and update index.html
        run: |
          git checkout gh-pages
          git show main:scripts/generate-index-html.py > /tmp/generate-index-html.py
          git show main:scripts/index.html.j2 > /tmp/index.html.j2
          chmod +x /tmp/generate-index-html.py
          cd /tmp && ./generate-index-html.py $GITHUB_WORKSPACE/index.yaml $GITHUB_WORKSPACE/index.html
          cd $GITHUB_WORKSPACE
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html"
            exit 0
          fi
          git commit -m "Update index.html from index.yaml"
          git push origin gh-pages
        continue-on-error: true
