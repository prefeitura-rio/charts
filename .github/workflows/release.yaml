name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - "index.html"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Copy index.html to gh-pages
        run: |
          git show main:index.html > /tmp/index.html
          git checkout gh-pages
          cp /tmp/index.html .
          git add index.html

          if git diff --staged --quiet; then
            echo "No changes to index.html"
            exit 0
          fi

          git commit -m "Update index.html from main"
          git push origin gh-pages
        continue-on-error: true
