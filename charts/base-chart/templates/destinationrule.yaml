{{- if and .Values.istio.enabled .Values.istio.destinationRule.enabled -}}
{{- $fullName := include "base-chart.fullname" . -}}
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "base-chart.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  host: {{ $fullName }}.{{ .Release.Namespace }}.svc.cluster.local
  {{- with .Values.istio.destinationRule.trafficPolicy }}
  trafficPolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.istio.destinationRule.portLevelSettings }}
  portLevelSettings:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}