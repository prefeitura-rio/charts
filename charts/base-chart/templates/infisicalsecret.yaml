{{- if .Values.infisicalSecret.enabled }}
{{- $secretName := .Values.infisicalSecret.secretName | required "infisicalSecret.secretName is required when infisicalSecret.enabled is true" }}
{{- $secretNamespace := .Values.infisicalSecret.managedSecretNamespace | default .Release.Namespace }}
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "base-chart.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: {{ .Values.infisicalSecret.projectSlug | required "infisicalSecret.projectSlug is required" }}
        envSlug: {{ .Values.infisicalSecret.envSlug | required "infisicalSecret.envSlug is required" }}
        secretsPath: {{ .Values.infisicalSecret.secretsPath | default "/" | quote }}
        recursive: {{ .Values.infisicalSecret.recursive | default true }}
      credentialsRef:
        secretName: {{ .Values.infisicalSecret.universalAuth.credentialsRef.secretName | default "infisical-universal-auth" }}
        secretNamespace: {{ .Values.infisicalSecret.universalAuth.credentialsRef.secretNamespace | default "infisical" }}
    {{- if .Values.infisicalSecret.kubernetesAuth.enabled }}
    kubernetesAuth:
      identityId: {{ .Values.infisicalSecret.kubernetesAuth.identityId | required "infisicalSecret.kubernetesAuth.identityId is required when kubernetesAuth is enabled" }}
      serviceAccountRef:
        name: {{ .Values.infisicalSecret.kubernetesAuth.serviceAccountRef.name | required "infisicalSecret.kubernetesAuth.serviceAccountRef.name is required" }}
        namespace: {{ .Values.infisicalSecret.kubernetesAuth.serviceAccountRef.namespace | default "default" }}
      secretsScope:
        projectSlug: {{ .Values.infisicalSecret.projectSlug }}
        envSlug: {{ .Values.infisicalSecret.envSlug }}
        secretsPath: {{ .Values.infisicalSecret.secretsPath | default "/" | quote }}
        recursive: {{ .Values.infisicalSecret.recursive | default true }}
    {{- end }}
  managedKubeSecretReferences:
    - secretName: {{ $secretName }}
      secretNamespace: {{ $secretNamespace }}
      creationPolicy: {{ .Values.infisicalSecret.creationPolicy | default "Orphan" }}
      template:
        includeAllSecrets: true
{{- end }}
