{{- if .Values.infisicalSecret.enabled }}
{{- $secretName := .Values.infisicalSecret.secretName | required "infisicalSecret.secretName is required when infisicalSecret.enabled is true" }}
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "base-chart.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: {{ .Values.infisicalSecret.projectSlug | required "infisicalSecret.projectSlug is required" }}
        envSlug: {{ .Values.infisicalSecret.envSlug | required "infisicalSecret.envSlug is required" }}
        secretsPath: {{ .Values.infisicalSecret.secretsPath | default "/" | quote }}
        recursive: {{ .Values.infisicalSecret.recursive | default true }}
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: {{ $secretName }}
      secretNamespace: {{ .Release.Namespace }}
      creationPolicy: {{ .Values.infisicalSecret.creationPolicy | default "Orphan" }}
      template:
        includeAllSecrets: true
{{- end }}
