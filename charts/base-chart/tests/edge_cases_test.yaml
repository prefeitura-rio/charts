suite: test edge cases
tests:
  - it: deployment should handle empty healthCheck.path gracefully
    templates:
      - deployment.yaml
    set:
      healthCheck:
        path: ""
      livenessProbe:
        httpGet:
          path: /health
      readinessProbe:
        httpGet:
          path: /ready
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready

  - it: scaledobject should handle prometheus trigger with no metadata
    templates:
      - scaledobject.yaml
    set:
      autoscaling:
        enabled: true
        keda:
          triggers:
            - type: prometheus
    asserts:
      - isKind:
          of: ScaledObject
      - equal:
          path: spec.triggers[0].metadata.serverAddress
          value: http://prometheus-server.istio-system.svc.cluster.local:9090
      - equal:
          path: spec.triggers[0].metadata.threshold
          value: "100"

  - it: virtualservice should handle empty gateways list
    templates:
      - virtualservice.yaml
    set:
      istio:
        enabled: true
        virtualService:
          hosts:
            - test.example.com
          gateways: []
    asserts:
      - contains:
          path: spec.gateways
          content: istio-system/istio-gateway

  - it: imageupdater should handle empty images list
    templates:
      - imageupdater.yaml
    set:
      argoImageUpdater:
        enabled: true
      image:
        repository: myrepo/myimage
        tag: v1.0.0
      fullnameOverride: myapp
    asserts:
      - equal:
          path: spec.applicationRefs[0].images[0].alias
          value: myapp
      - equal:
          path: spec.applicationRefs[0].images[0].imageName
          value: "myrepo/myimage:v1.0.0"

  - it: should not render virtualservice when istio disabled
    templates:
      - virtualservice.yaml
    set:
      istio:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render destinationrule when istio disabled
    templates:
      - destinationrule.yaml
    set:
      istio:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render scaledobject when autoscaling disabled
    templates:
      - scaledobject.yaml
    set:
      autoscaling:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render hpa when autoscaling disabled
    templates:
      - hpa.yaml
    set:
      autoscaling:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render imageupdater when disabled
    templates:
      - imageupdater.yaml
    set:
      argoImageUpdater:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render serviceaccount when create is false
    templates:
      - serviceaccount.yaml
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render poddisruptionbudget when disabled
    templates:
      - poddisruptionbudget.yaml
    set:
      podDisruptionBudget:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render infisicalsecret when disabled
    templates:
      - infisicalsecret.yaml
    set:
      infisicalSecret:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render affinity when podAntiAffinity disabled
    templates:
      - deployment.yaml
    set:
      podAntiAffinity:
        enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.affinity

  - it: should use hard anti-affinity with required scheduling
    templates:
      - deployment.yaml
    set:
      podAntiAffinity:
        enabled: true
        type: hard
    asserts:
      - exists:
          path: spec.template.spec.affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution
      - notExists:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution

  - it: should render HPA when KEDA is disabled
    templates:
      - hpa.yaml
    set:
      autoscaling:
        enabled: true
        keda:
          enabled: false
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler

  - it: should render ScaledObject when KEDA is enabled
    templates:
      - scaledobject.yaml
    set:
      autoscaling:
        enabled: true
        keda:
          enabled: true
          triggers:
            - type: prometheus
    asserts:
      - isKind:
          of: ScaledObject

  - it: should not render HPA when KEDA is enabled
    templates:
      - hpa.yaml
    set:
      autoscaling:
        enabled: true
        keda:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: fullnameOverride should override all resource names
    templates:
      - deployment.yaml
      - service.yaml
    set:
      fullnameOverride: custom-name
    asserts:
      - template: deployment.yaml
        equal:
          path: metadata.name
          value: custom-name
      - template: service.yaml
        equal:
          path: metadata.name
          value: custom-name

  - it: fullnameOverride should limit name length
    templates:
      - deployment.yaml
    set:
      fullnameOverride: short-name
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "^.{1,63}$"

  - it: should merge custom podSecurityContext with defaults
    templates:
      - deployment.yaml
    set:
      podSecurityContext:
        runAsNonRoot: true
        fsGroup: 1000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: should merge custom securityContext with defaults
    templates:
      - deployment.yaml
    set:
      securityContext:
        allowPrivilegeEscalation: false
        runAsUser: 1000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000

  - it: should handle empty resources gracefully
    templates:
      - deployment.yaml
    set:
      resources: {}
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].resources.limits
      - notExists:
          path: spec.template.spec.containers[0].resources.requests

  - it: should set resources when specified
    templates:
      - deployment.yaml
    set:
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi

  - it: virtualservice should auto-add route when http has no routes
    templates:
      - virtualservice.yaml
    release:
      namespace: test-ns
    set:
      istio:
        enabled: true
        virtualService:
          hosts:
            - test.example.com
          http:
            - match:
                - uri:
                    prefix: /api
              timeout: 30s
    asserts:
      - exists:
          path: spec.http[0].route
      - equal:
          path: spec.http[0].route[0].destination.host
          value: RELEASE-NAME.test-ns.svc.cluster.local
