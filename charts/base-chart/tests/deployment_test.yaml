suite: test deployment
templates:
  - deployment.yaml
tests:
  - it: should render deployment with default values
    set:
      autoscaling.enabled: false
      image.tag: "1.25"
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nginx:1.25"

  - it: should use custom image when specified
    set:
      image.repository: custom-app
      image.tag: "v2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "custom-app:v2.0.0"

  - it: should not set replicas when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas

  - it: should add Istio sidecar annotations when enabled
    set:
      istio.enabled: true
    asserts:
      - equal:
          path: spec.template.metadata.annotations["sidecar.istio.io/rewriteAppHTTPProbers"]
          value: "false"
      - equal:
          path: spec.template.metadata.annotations["sidecar.istio.io/proxyCPU"]
          value: "100m"

  - it: should include Infisical auto-reload annotation
    asserts:
      - equal:
          path: metadata.annotations["secrets.infisical.com/auto-reload"]
          value: "true"

  - it: should add security context when specified
    set:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000

  - it: should add resource limits when specified
    set:
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 250m
          memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi

  - it: should add environment variables from envFrom
    set:
      envFrom:
        - secretRef:
            name: app-secrets
        - configMapRef:
            name: app-config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: app-secrets
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: app-config

  - it: should have sync-wave 1 annotation
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "1"

  - it: should inject REDIS_HOST and REDIS_PORT when valkey is enabled
    set:
      valkey:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: RELEASE-NAME-valkey
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PORT
            value: "6379"

  - it: should inject RABBITMQ_HOST, RABBITMQ_PORT and RABBITMQ_USER when rabbitmq is enabled
    set:
      rabbitmq:
        enabled: true
        service:
          amqpPort: 5672
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RABBITMQ_HOST
            value: RELEASE-NAME-rabbitmq
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RABBITMQ_PORT
            value: "5672"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RABBITMQ_USER
            value: RELEASE-NAME

  - it: should use infisicalSecret.secretName in envFrom when infisicalSecret is enabled
    set:
      infisicalSecret:
        enabled: true
        secretName: my-app-secrets
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-app-secrets

  - it: should use infisicalSecret.secretName in envFrom when infisicalSecret is enabled
    set:
      infisicalSecret:
        enabled: true
        secretName: "my-app-secrets"
        projectSlug: "my-project"
        envSlug: "prod"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-app-secrets

  - it: should use serviceAccountName from helper when serviceAccount is created
    set:
      serviceAccount:
        create: true
        name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: should use default serviceAccountName when serviceAccount is not created
    set:
      serviceAccount:
        create: false
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default

  - it: should use healthCheck.path for both probes when set
    set:
      healthCheck:
        path: /health
      service:
        containerPort: 8000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8000
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 8000

  - it: should use healthCheck.port when specified
    set:
      healthCheck:
        path: /healthz
        port: 9090
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 9090
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 9090

  - it: should use separate probes when healthCheck.path is not set
    set:
      healthCheck:
        path: ""
      livenessProbe:
        httpGet:
          path: /alive
      readinessProbe:
        httpGet:
          path: /ready
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /alive
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready

  - it: should use default probes when healthCheck.path is empty
    set:
      healthCheck:
        path: ""
      livenessProbe:
        httpGet:
          path: /
      readinessProbe:
        httpGet:
          path: /
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /

  - it: should have production security defaults for pod
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should have production security defaults for container
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: should have soft pod anti-affinity by default
    asserts:
      - exists:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution

  - it: should use hostname topology key by default
    asserts:
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.topologyKey
          value: kubernetes.io/hostname

  - it: should use hard anti-affinity when type is hard
    set:
      podAntiAffinity:
        enabled: true
        type: hard
    asserts:
      - exists:
          path: spec.template.spec.affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution

  - it: should use zone topology when specified
    set:
      podAntiAffinity:
        enabled: true
        topologyKey: topology.kubernetes.io/zone
    asserts:
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.topologyKey
          value: topology.kubernetes.io/zone

  - it: should not have affinity when podAntiAffinity is disabled
    set:
      podAntiAffinity:
        enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.affinity
  - it: should use ghcr-credentials when imagePullSecrets is empty
    set:
      imagePullSecrets: []
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: ghcr-credentials

  - it: should use provided imagePullSecrets when set
    set:
      imagePullSecrets:
        - name: my-registry-secret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: my-registry-secret
      - notContains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: ghcr-credentials

  - it: should render startupProbe when healthCheck.path is set
    set:
      healthCheck:
        path: /health
    asserts:
      - exists:
          path: spec.template.spec.containers[0].startupProbe

  - it: should render startupProbe when explicitly set
    set:
      startupProbe:
        httpGet:
          path: /startup
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /startup

  - it: should not render startupProbe when not set
    set:
      healthCheck:
        path: ""
      startupProbe: {}
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].startupProbe

  - it: should render nodeSelector when set
    set:
      nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should not render nodeSelector when empty
    set:
      nodeSelector: {}
    asserts:
      - notExists:
          path: spec.template.spec.nodeSelector

  - it: should render tolerations when set
    set:
      tolerations:
        - key: "spot"
          operator: "Exists"
          effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "spot"
            operator: "Exists"
            effect: "NoSchedule"

  - it: should not render tolerations when empty
    set:
      tolerations: []
    asserts:
      - notExists:
          path: spec.template.spec.tolerations

  - it: should render terminationGracePeriodSeconds when set
    set:
      terminationGracePeriodSeconds: 60
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 60

  - it: should not render terminationGracePeriodSeconds when not set
    asserts:
      - notExists:
          path: spec.template.spec.terminationGracePeriodSeconds

  - it: should render lifecycle preStop when set
    set:
      lifecycle:
        preStop:
          exec:
            command: ["/bin/sh", "-c", "sleep 5"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].lifecycle.preStop.exec.command[0]
          value: "/bin/sh"

  - it: should not render lifecycle when not set
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].lifecycle

  - it: should render topologySpreadConstraints when set
    set:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: myapp
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].maxSkew
          value: 1
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: topology.kubernetes.io/zone

  - it: should not render topologySpreadConstraints when empty
    set:
      topologySpreadConstraints: []
    asserts:
      - notExists:
          path: spec.template.spec.topologySpreadConstraints

  - it: should render revisionHistoryLimit when set
    set:
      revisionHistoryLimit: 3
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: should not render revisionHistoryLimit when not set
    asserts:
      - notExists:
          path: spec.revisionHistoryLimit

  - it: should apply timing fields to all probes when healthCheck.path is set
    set:
      healthCheck:
        path: /health
        initialDelaySeconds: 10
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 6
        successThreshold: 1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 6
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 5

  - it: should not add timing fields when not set with healthCheck.path
    set:
      healthCheck:
        path: /health
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds

  - it: should emit containerPort entries for additional service.ports
    set:
      service.ports:
        - name: metrics
          port: 9090
          targetPort: 9090
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9090
            protocol: TCP

  - it: should only have primary containerPort when service.ports is empty
    set:
      service.ports: []
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1
