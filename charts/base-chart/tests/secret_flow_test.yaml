suite: test secret flow (infisicalSecret.secretName)
tests:
  - it: InfisicalSecret and Deployment should use same infisicalSecret.secretName
    templates:
      - infisicalsecret.yaml
      - deployment.yaml
    set:
      infisicalSecret:
        enabled: true
        secretName: my-app-secrets
        projectSlug: my-project
        envSlug: prod
    asserts:
      - template: infisicalsecret.yaml
        equal:
          path: spec.managedKubeSecretReferences[0].secretName
          value: my-app-secrets
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-app-secrets

  - it: InfisicalSecret should be created before Deployment (sync-wave order)
    templates:
      - infisicalsecret.yaml
      - deployment.yaml
    set:
      infisicalSecret:
        enabled: true
        secretName: my-app-secrets
        projectSlug: my-project
        envSlug: prod
    asserts:
      - template: infisicalsecret.yaml
        equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-1"
      - template: deployment.yaml
        equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "1"

  - it: Deployment should not have envFrom when infisicalSecret is disabled
    templates:
      - deployment.yaml
    set:
      infisicalSecret:
        enabled: false
      envFrom: []
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: Deployment should combine infisicalSecret with custom envFrom
    templates:
      - deployment.yaml
    set:
      infisicalSecret:
        enabled: true
        secretName: infisical-secrets
        projectSlug: my-project
        envSlug: prod
      envFrom:
        - configMapRef:
            name: app-config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: infisical-secrets
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: app-config

  - it: Full stack with cache and queue should inject connection info
    templates:
      - deployment.yaml
    set:
      infisicalSecret:
        enabled: true
        secretName: my-app-secrets
        projectSlug: my-project
        envSlug: prod
      valkey:
        enabled: true
      rabbitmq:
        enabled: true
        service:
          amqpPort: 5672
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-app-secrets
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: RELEASE-NAME-valkey
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PORT
            value: "6379"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RABBITMQ_HOST
            value: RELEASE-NAME-rabbitmq
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RABBITMQ_PORT
            value: "5672"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RABBITMQ_USER
            value: RELEASE-NAME
