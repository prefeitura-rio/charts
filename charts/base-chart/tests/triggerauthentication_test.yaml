suite: test triggerauthentication
templates:
  - triggerauthentication.yaml
tests:
  - it: should not render when triggerAuthentication not set
    set:
      autoscaling.enabled: true
      autoscaling.keda.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when autoscaling disabled
    set:
      autoscaling.enabled: false
      autoscaling.keda.triggerAuthentication:
        secretTargetRef:
          - parameter: password
            name: my-secret
            key: password
    asserts:
      - hasDocuments:
          count: 0

  - it: should render with secretTargetRef
    set:
      autoscaling.enabled: true
      autoscaling.keda.enabled: true
      autoscaling.keda.triggerAuthentication:
        secretTargetRef:
          - parameter: password
            name: my-secret
            key: password
    asserts:
      - isKind:
          of: TriggerAuthentication
      - equal:
          path: spec.secretTargetRef[0].parameter
          value: password
      - equal:
          path: spec.secretTargetRef[0].name
          value: my-secret

  - it: should use default name from fullname
    set:
      autoscaling.enabled: true
      autoscaling.keda.enabled: true
      autoscaling.keda.triggerAuthentication:
        secretTargetRef:
          - parameter: password
            name: my-secret
            key: password
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-trigger-auth

  - it: should use custom name when provided
    set:
      autoscaling.enabled: true
      autoscaling.keda.enabled: true
      autoscaling.keda.triggerAuthentication:
        name: my-custom-auth
        secretTargetRef:
          - parameter: password
            name: my-secret
            key: password
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-auth

  - it: should have sync-wave 1
    set:
      autoscaling.enabled: true
      autoscaling.keda.enabled: true
      autoscaling.keda.triggerAuthentication:
        secretTargetRef:
          - parameter: password
            name: my-secret
            key: password
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "1"

  - it: should render env when specified
    set:
      autoscaling.enabled: true
      autoscaling.keda.enabled: true
      autoscaling.keda.triggerAuthentication:
        env:
          - parameter: password
            name: MY_PASSWORD
            containerName: app
    asserts:
      - equal:
          path: spec.env[0].parameter
          value: password

  - it: should render podIdentity when specified
    set:
      autoscaling.enabled: true
      autoscaling.keda.enabled: true
      autoscaling.keda.triggerAuthentication:
        podIdentity:
          provider: gcp
    asserts:
      - equal:
          path: spec.podIdentity.provider
          value: gcp
