suite: test serviceaccount
templates:
  - serviceaccount.yaml
tests:
  - it: should not render when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME

  - it: should use custom name when specified
    set:
      serviceAccount.create: true
      serviceAccount.name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa

  - it: should have sync-wave 0 annotation
    set:
      serviceAccount.create: true
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "0"

  - it: should include custom annotations
    set:
      serviceAccount.create: true
      serviceAccount.annotations:
        iam.gke.io/gcp-service-account: my-sa@my-project.iam.gserviceaccount.com
    asserts:
      - equal:
          path: metadata.annotations["iam.gke.io/gcp-service-account"]
          value: my-sa@my-project.iam.gserviceaccount.com

  - it: should set automountServiceAccountToken
    set:
      serviceAccount.create: true
      serviceAccount.automount: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false
