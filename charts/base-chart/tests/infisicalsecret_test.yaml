suite: test infisicalsecret
templates:
  - infisicalsecret.yaml
tests:
  - it: should not render when disabled
    set:
      infisicalSecret.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render with required fields
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-app-secrets
      infisicalSecret.projectSlug: my-project
      infisicalSecret.envSlug: prod
    asserts:
      - isKind:
          of: InfisicalSecret
      - equal:
          path: metadata.name
          value: my-app-secrets
      - equal:
          path: spec.managedKubeSecretReferences[0].secretName
          value: my-app-secrets

  - it: should have sync-wave -1 annotation
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-project
      infisicalSecret.envSlug: prod
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-1"

  - it: should always render universalAuth
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: staging
    asserts:
      - equal:
          path: spec.authentication.universalAuth.secretsScope.projectSlug
          value: my-proj
      - equal:
          path: spec.authentication.universalAuth.secretsScope.envSlug
          value: staging

  - it: should default universalAuth credentialsRef
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
    asserts:
      - equal:
          path: spec.authentication.universalAuth.credentialsRef.secretName
          value: infisical-universal-auth
      - equal:
          path: spec.authentication.universalAuth.credentialsRef.secretNamespace
          value: infisical

  - it: should allow custom universalAuth credentialsRef
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
      infisicalSecret.universalAuth.credentialsRef.secretName: custom-auth
      infisicalSecret.universalAuth.credentialsRef.secretNamespace: custom-ns
    asserts:
      - equal:
          path: spec.authentication.universalAuth.credentialsRef.secretName
          value: custom-auth
      - equal:
          path: spec.authentication.universalAuth.credentialsRef.secretNamespace
          value: custom-ns

  - it: should not render kubernetesAuth by default
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
    asserts:
      - isNull:
          path: spec.authentication.kubernetesAuth

  - it: should render kubernetesAuth alongside universalAuth when enabled
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
      infisicalSecret.kubernetesAuth.enabled: true
      infisicalSecret.kubernetesAuth.identityId: "abc-123"
      infisicalSecret.kubernetesAuth.serviceAccountRef.name: infisical-auth
    asserts:
      - equal:
          path: spec.authentication.universalAuth.secretsScope.projectSlug
          value: my-proj
      - equal:
          path: spec.authentication.kubernetesAuth.identityId
          value: "abc-123"
      - equal:
          path: spec.authentication.kubernetesAuth.serviceAccountRef.name
          value: infisical-auth
      - equal:
          path: spec.authentication.kubernetesAuth.serviceAccountRef.namespace
          value: default
      - equal:
          path: spec.authentication.kubernetesAuth.secretsScope.projectSlug
          value: my-proj
      - equal:
          path: spec.authentication.kubernetesAuth.secretsScope.envSlug
          value: prod

  - it: should use custom secretsPath in both auth methods
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
      infisicalSecret.secretsPath: "/custom"
      infisicalSecret.kubernetesAuth.enabled: true
      infisicalSecret.kubernetesAuth.identityId: "abc-123"
      infisicalSecret.kubernetesAuth.serviceAccountRef.name: infisical-auth
    asserts:
      - equal:
          path: spec.authentication.universalAuth.secretsScope.secretsPath
          value: "/custom"
      - equal:
          path: spec.authentication.kubernetesAuth.secretsScope.secretsPath
          value: "/custom"

  - it: should default serviceAccountRef namespace to default
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
      infisicalSecret.kubernetesAuth.enabled: true
      infisicalSecret.kubernetesAuth.identityId: "abc-123"
      infisicalSecret.kubernetesAuth.serviceAccountRef.name: infisical-auth
    asserts:
      - equal:
          path: spec.authentication.kubernetesAuth.serviceAccountRef.namespace
          value: default

  - it: should use Orphan creationPolicy by default
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
    asserts:
      - equal:
          path: spec.managedKubeSecretReferences[0].creationPolicy
          value: Orphan
  - it: should default managedSecretNamespace to Release.Namespace
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
    asserts:
      - equal:
          path: spec.managedKubeSecretReferences[0].secretNamespace
          value: NAMESPACE

  - it: should use custom managedSecretNamespace when set
    set:
      infisicalSecret.enabled: true
      infisicalSecret.secretName: my-secrets
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
      infisicalSecret.managedSecretNamespace: custom-ns
    asserts:
      - equal:
          path: spec.managedKubeSecretReferences[0].secretNamespace
          value: custom-ns
