suite: test typesense statefulset
templates:
  - statefulset.yaml
tests:
  - it: should render statefulset with default values
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: RELEASE-NAME-typesense
      - equal:
          path: spec.replicas
          value: 3

  - it: should use custom replicas when specified
    set:
      replicas: 5
    asserts:
      - equal:
          path: spec.replicas
          value: 5

  - it: should use correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/typesense/typesense:30.1"

  - it: should use custom image tag when specified
    set:
      image.tag: "30.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/typesense/typesense:30.0"

  - it: should mount persistence volume when enabled
    set:
      persistence.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should have volumeClaimTemplates when persistence enabled
    set:
      persistence.enabled: true
    asserts:
      - isNotEmpty:
          path: spec.volumeClaimTemplates

  - it: should use default PVC size
    set:
      persistence.enabled: true
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 25Gi

  - it: should have TYPESENSE_DATA_DIR env variable
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TYPESENSE_DATA_DIR
            value: /data

  - it: should set resources when specified
    set:
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2
          memory: 4Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 4Gi
