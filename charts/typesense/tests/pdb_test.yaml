suite: test typesense pod disruption budget
templates:
  - pdb.yaml
tests:
  - it: should render PDB when enabled
    set:
      pdb.enabled: true
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: RELEASE-NAME-typesense-pdb

  - it: should not render when disabled
    set:
      pdb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use minAvailable by default
    set:
      pdb.enabled: true
    asserts:
      - equal:
          path: spec.minAvailable
          value: 1

  - it: should use custom minAvailable when specified
    set:
      pdb.enabled: true
      pdb.minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2
