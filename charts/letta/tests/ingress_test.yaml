suite: test letta ingress
templates:
  - ingress.yaml
tests:
  - it: should not render when ingress disabled
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when ingress enabled
    set:
      ingress.enabled: true
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: RELEASE-NAME-letta

  - it: should use default host
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: "letta.example.com"

  - it: should use custom host when specified
    set:
      ingress.enabled: true
      ingress.host: letta.mydomain.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: "letta.mydomain.com"

  - it: should route to correct service and port
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: RELEASE-NAME-letta
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8283

  - it: should add custom annotations
    set:
      ingress.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
        cert-manager.io/cluster-issuer: letsencrypt
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
          value: /
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt

  - it: should configure TLS when specified
    set:
      ingress.enabled: true
      ingress.host: letta.example.com
      ingress.tls:
        - hosts:
            - letta.example.com
          secretName: letta-tls
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: letta.example.com
      - equal:
          path: spec.tls[0].secretName
          value: letta-tls
