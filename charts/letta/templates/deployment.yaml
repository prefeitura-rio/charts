apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "letta.fullname" . }}
  labels:
    {{- include "letta.labels" . | nindent 4 }}
  {{- with .Values.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.deployment.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "letta.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "letta.selectorLabels" . | nindent 8 }}
      {{- with .Values.deployment.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.deployment.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.deployment.terminationGracePeriodSeconds | default 30 }}
      containers:
        - name: letta
          image: {{ .Values.deployment.image | quote }}
          imagePullPolicy: {{ .Values.deployment.imagePullPolicy | default "IfNotPresent" }}
          {{- with .Values.deployment.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.deployment.containerPort | default 8283 }}
              protocol: TCP
          env:
            - name: PGDATA
              value: {{ .Values.deployment.pgDataPath | default "/var/lib/postgresql/data/pgdata" | quote }}
          {{- range $key, $value := .Values.deployment.env }}
            - name: {{ $key | quote }}
              value: {{ $value | quote }}
          {{- end }}
          {{- if .Values.deployment.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.deployment.envFromSecret | quote }}
          {{- end }}
          {{- with .Values.deployment.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.deployment.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.deployment.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: letta-storage
              mountPath: {{ .Values.persistence.mountPath | default "/var/lib/postgresql/data" }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: letta-storage
          persistentVolumeClaim:
            claimName: {{ include "letta.fullname" . }}-pvc
      {{- end }}
      {{- with .Values.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
