suite: test cloudsql-proxy secret
templates:
  - secret.yaml
values:
  - ../values.yaml
set:
  instance.projectId: test-project
  instance.region: us-central1
  instance.name: test-instance
tests:
  # Secret creation tests
  - it: should not create secret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create secret when only existingSecret is set
    set:
      secret.existingSecret: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should create secret when create is true and serviceAccountKey is provided
    set:
      secret.create: true
      secret.serviceAccountKey: '{"type": "service_account", "project_id": "test"}'
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudsql-proxy-credentials

  - it: should use correct key name in secret
    set:
      secret.create: true
      secret.serviceAccountKey: '{"type": "service_account"}'
      secret.key: my-sa.json
    asserts:
      - exists:
          path: data["my-sa.json"]

  - it: should base64 encode the service account key
    set:
      secret.create: true
      secret.serviceAccountKey: '{"type": "service_account"}'
    asserts:
      - equal:
          path: data["service-account-key.json"]
          value: eyJ0eXBlIjogInNlcnZpY2VfYWNjb3VudCJ9

  - it: should not create secret when existingSecret takes precedence
    set:
      secret.existingSecret: my-existing-secret
      secret.create: true
      secret.serviceAccountKey: '{"type": "service_account"}'
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create secret when create is true but no key provided
    set:
      secret.create: true
      secret.serviceAccountKey: ""
    asserts:
      - hasDocuments:
          count: 0
