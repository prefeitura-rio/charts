suite: test cloudsql-proxy serviceaccount
templates:
  - serviceaccount.yaml
values:
  - ../values.yaml
set:
  instance.projectId: test-project
  instance.region: us-central1
  instance.name: test-instance
tests:
  # Workload Identity - creates ServiceAccount
  - it: should create serviceaccount when gcpServiceAccount is set
    set:
      serviceAccount.gcpServiceAccount: cloudsql-proxy@my-project.iam.gserviceaccount.com
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudsql-proxy
      - equal:
          path: metadata.annotations["iam.gke.io/gcp-service-account"]
          value: cloudsql-proxy@my-project.iam.gserviceaccount.com

  - it: should use custom name when specified with Workload Identity
    set:
      serviceAccount.gcpServiceAccount: cloudsql-proxy@my-project.iam.gserviceaccount.com
      serviceAccount.name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa

  - it: should have automountServiceAccountToken enabled
    set:
      serviceAccount.gcpServiceAccount: cloudsql-proxy@my-project.iam.gserviceaccount.com
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: should have correct labels
    set:
      serviceAccount.gcpServiceAccount: cloudsql-proxy@my-project.iam.gserviceaccount.com
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudsql-proxy
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  # SA Key auth - no ServiceAccount created
  - it: should not create serviceaccount when gcpServiceAccount is empty
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create serviceaccount when using secret auth
    set:
      secret.existingSecret: my-sa-key
    asserts:
      - hasDocuments:
          count: 0

  # Existing ServiceAccount - no creation
  - it: should not create serviceaccount when existingServiceAccount is set
    set:
      serviceAccount.existingServiceAccount: my-existing-sa
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create serviceaccount when existingServiceAccount takes precedence
    set:
      serviceAccount.existingServiceAccount: my-existing-sa
      serviceAccount.gcpServiceAccount: cloudsql-proxy@my-project.iam.gserviceaccount.com
    asserts:
      - hasDocuments:
          count: 0
