suite: test cloudsql-proxy deployment
templates:
  - deployment.yaml
values:
  - ../values.yaml
set:
  instance.projectId: test-project
  instance.region: us-central1
  instance.name: test-instance
tests:
  # Basic deployment tests
  - it: should render deployment with required values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudsql-proxy

  - it: should use correct image and tag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.21.1"

  - it: should use custom image tag when specified
    set:
      image.tag: "2.20.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.20.0"

  # Instance connection string tests
  - it: should have correct instance connection string in args
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "test-project:us-central1:test-instance"

  # PostgreSQL use case (civitas/danfe pattern)
  - it: should use default PostgreSQL port
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--port=5432"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5432

  # MySQL use case (danfe pattern)
  - it: should use MySQL port when specified
    set:
      proxy.port: 3306
      proxy.healthCheckPort: 9091
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--port=3306"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3306
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--http-port=9091"

  # Private IP tests (civitas/danfe pattern)
  - it: should enable private IP by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--private-ip"

  - it: should disable private IP when specified (k3s public pattern)
    set:
      proxy.privateIp: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--private-ip"

  # Logging tests
  - it: should enable structured logs by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--structured-logs"

  - it: should enable lazy refresh by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--lazy-refresh"

  # Connection pool tests
  - it: should set max connections (default 100)
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--max-connections=100"

  - it: should use custom max connections (danfe MySQL uses 300)
    set:
      proxy.maxConnections: 300
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--max-connections=300"

  # Auto IAM auth tests (civitas pattern)
  - it: should enable auto IAM auth when specified
    set:
      proxy.autoIamAuthn: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--auto-iam-authn"

  - it: should not enable auto IAM auth by default
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--auto-iam-authn"

  # Health check tests (civitas/danfe pattern)
  - it: should have health check port by default (port 9090)
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--health-check"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--http-address=0.0.0.0"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--http-port=9090"
      - equal:
          path: spec.template.spec.containers[0].ports[1].containerPort
          value: 9090
      - equal:
          path: spec.template.spec.containers[0].ports[1].name
          value: http-health

  - it: should disable health check when port is 0 (k3s simpler pattern)
    set:
      proxy.healthCheckPort: 0
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--health-check"
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1

  # Probe tests
  - it: should have liveness probe when health check enabled
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /liveness
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http-health

  - it: should have readiness probe when health check enabled
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readiness
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http-health

  - it: should not have probes when health check disabled
    set:
      proxy.healthCheckPort: 0
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe

  # Security context tests (civitas/danfe hardened pattern)
  - it: should have pod security context (runAsUser 65532)
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 65532

  - it: should have container security context (hardened)
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  # Resource tests (civitas/danfe pattern)
  - it: should have default resources (512Mi/2Gi memory)
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 2Gi

  - it: should use custom resources (k3s smaller pattern)
    set:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  # Replica tests
  - it: should use default replica count (1)
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should use custom replica count (HA pattern)
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  # Extra args tests
  - it: should add extra args when specified
    values:
      - extra-args-values.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--debug"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--quota-project=my-project"
