{{- if include "cloudsql-proxy.createServiceAccount" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cloudsql-proxy.serviceAccountName" . }}
  labels:
    {{- include "cloudsql-proxy.labels" . | nindent 4 }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount }}
automountServiceAccountToken: true
{{- end }}
