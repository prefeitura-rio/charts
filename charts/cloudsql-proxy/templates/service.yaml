apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudsql-proxy.fullname" . }}
  labels:
    {{- include "cloudsql-proxy.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ include "cloudsql-proxy.servicePort" . }}
      targetPort: db
      protocol: TCP
      name: db
  selector:
    {{- include "cloudsql-proxy.selectorLabels" . | nindent 4 }}
